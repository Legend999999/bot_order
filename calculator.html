<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <link rel="stylesheet" href="calculator.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San FX - Mathematical Pivot Levels</title>
    <style>
        /* --- Root Theme Variables --- */
        :root {
            --neon-purple: #8a2be2;
            --bg-dark: #0d0e12;
            --tp-green: #00e676;
            --tp-red: #ff3d00;
            --tp-hold: #29b6f6;
            --tp-yellow: #ffd600;
            --pivot-gray: #eceff1;
        }

        /* --- Active/Held Button State --- */
        .tf-btn.active {
            background: var(--neon-purple) !important;
            border-color: var(--neon-purple) !important;
            color: #fff !important;
            box-shadow: 0 0 12px var(--neon-purple);
        }

        /* --- Premium Trading Levels Layout Styles --- */
        .levels-container {
            width: 100%;
            max-width: 440px;
            margin: 40px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            background: rgba(20, 22, 27, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
        }

        .level-row {
            display: flex;
            align-items: center;
            width: 100%;
        }

        .level-label {
            width: 90px;
            font-size: 1.15rem;
            font-weight: 600;
            color: #90a4ae;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-line {
            flex-grow: 1;
            height: 3px;
            border-radius: 4px;
        }

        .level-box {
            flex-grow: 1;
            height: 50px;
            border-radius: 6px;
            background-color: transparent;
            transition: all 0.3s ease;
        }

        /* Center Pivot Block */
        .pivot-block {
            flex-grow: 1;
            height: 52px;
            border: 3px solid var(--pivot-gray);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05), 0 0 15px rgba(236, 239, 241, 0.15);
            gap: 8px;
        }

        .pivot-block span {
            font-weight: 500;
            opacity: 0.9;
        }

        /* Specific Level Branding */
        .lbl-hold { color: var(--tp-hold); }
        .line-top-hold { 
            background: linear-gradient(90deg, transparent, var(--tp-yellow)); 
            height: 6px;
            box-shadow: 0 0 10px rgba(255, 214, 0, 0.3);
        }
        .line-bot-hold { 
            background: linear-gradient(90deg, transparent, var(--tp-yellow)); 
            height: 6px;
            box-shadow: 0 0 10px rgba(255, 214, 0, 0.3);
        }

        .line-green { 
            background: var(--tp-green); 
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.4);
        }
        .box-green { 
            border: 3px solid var(--tp-green); 
            box-shadow: inset 0 0 12px rgba(0, 230, 118, 0.05), 0 0 12px rgba(0, 230, 118, 0.2);
        }

        .line-red { 
            background: var(--tp-red); 
            box-shadow: 0 0 8px rgba(255, 61, 0, 0.4);
        }
        .box-red { 
            border: 3px solid var(--tp-red); 
            box-shadow: inset 0 0 12px rgba(255, 61, 0, 0.05), 0 0 12px rgba(255, 61, 0, 0.2);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">

        <a href="index.html?showHub=true" class="back-arrow-btn">⬅️</a>
    </div>

    <div class="levels-container">
        <div class="level-row">
            <div class="level-label lbl-hold">Tp hold</div>

        <div class="level-row">

            <div class="level-box box-green"></div>
        </div>

        <div class="level-row">

            <div class="level-line line-green"></div>
        </div>

        <div class="level-row">
            <div class="level-label">Tp2</div>
            <div class="level-box box-green"></div>
        </div>

        <div class="level-row">
            <div class="level-label">Tp1</div>
            <div class="level-line line-green"></div>
        </div>

        <div class="level-row">
            <div class="level-label"></div>
            <div class="pivot-block">
                Pivot<span>هێڵی</span> 
            </div>
        </div>

        <div class="level-row">
            <div class="level-label">Tp1</div>
            <div class="level-line line-red"></div>

        <div class="level-row">
            <div class="level-label">Tp2</div>
            <div class="level-box box-red"></div>
        </div>

        <div class="level-row">
            <div class="level-label">Tp3</div>
            <div class="level-line line-red"></div>
        </div>

        <div class="level-row">
            <div class="level-label">Tp4</div>
            <div class="level-box box-red"></div>

            <div class="level-label lbl-hold">Tp hold</div>

    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="btn-close-menu">✕</button>
        
        <h3 style="color: var(--neon-purple); color: #fff; text-align: center; margin-top: 0; margin-bottom: 20px; padding: 10px 16px; font-family: 'Geeza Pro', 'Calibri', 'Tahoma', sans-serif; font-size: 17px; font-weight: bold; background: rgba(157, 78, 221, 0.06); border: 1px solid rgba(157, 78, 221, 0.2); border-radius: 8px; box-shadow: inset 0 0 8px #000000;" data-i18n="side_title">ژمێریاری جان</h3>
        
        <div id="controls-astro">
            <div class="search-box" style="display: flex; flex-direction: column; gap: 12px; padding: 10px;">
                
                <div class="search-group">
                    <input type="number" id="highPrice" placeholder="نرخی high" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>
                
                <div class="search-group">
                    <input type="number" id="lowPrice" placeholder="نرخی low" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>

                <div class="timeframe-buttons" style="display: flex; gap: 8px; width: 100%;">
                    <button class="tf-btn" data-tf="4h" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">4h</button>
                    <button class="tf-btn" data-tf="1d" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1d</button>
                    <button class="tf-btn" data-tf="1w" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1w</button>
                </div>

                <button id="btn-prepare" style="width: 100%; padding: 10px; background: var(--neon-purple); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px;" onclick="window.updateAstro()">ئامادەکردن</button>
                
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ku';
        let selectedTimeframe = ''; 

        function applyLanguage() {
            try { currentLang = localStorage.getItem('rfx_lang') || 'ku'; } catch(e) {}
            document.documentElement.dir = currentLang === 'en' ? 'ltr' : 'rtl';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.lexicon && lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-menu').addEventListener('click', function(e) { 
                e.stopPropagation(); 
                document.getElementById('sidebar').classList.toggle('active'); 
            });
            document.getElementById('btn-close-menu').addEventListener('click', function() { 
                document.getElementById('sidebar').classList.remove('active'); 
            });

            const tfButtons = document.querySelectorAll('.tf-btn');
            tfButtons.forEach(button => {
                button.addEventListener('click', function() {
                    tfButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    selectedTimeframe = this.getAttribute('data-tf');
                    console.log('Selected timeframe:', selectedTimeframe);
                    
                    if (typeof window.updateAstro === 'function') {
                        window.updateAstro();
                    }
                });
            });

            applyLanguage();
        });
    </script>
</body>
</html>
