<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <link rel="stylesheet" href="calculator.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San FX - Mathematical Pivot Levels</title>
    <style>
        /* Style for the active/held state */
        .tf-btn.active {
            background: var(--neon-purple, #8a2be2) !important;
            border-color: var(--neon-purple, #8a2be2) !important;
            color: #fff !important;
            box-shadow: 0 0 10px var(--neon-purple, #8a2be2);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <button class="menu-toggle" id="btn-menu" data-i18n="btn_menu">☰ ڕێکخستن</button>
        <div class="center-brand-text">@San_FX</div>
        <a href="index.html?showHub=true" class="back-arrow-btn">⬅️</a>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="btn-close-menu">✕</button>
        
        <h3 style="color: var(--neon-purple); text-align: center; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-top: 0;" data-i18n="side_title">ژمێریاری جان</h3>

        <div id="controls-astro">
            <div class="search-box" style="display: flex; flex-direction: column; gap: 12px; padding: 10px;">
                
                <!-- First Square: High Price -->
                <div class="search-group">
                    <input type="number" id="highPrice" placeholder="نرخی high" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>
                
                <!-- Second Square: Low Price -->
                <div class="search-group">
                    <input type="number" id="lowPrice" placeholder="نرخی low" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>

                <!-- Timeframe Buttons Row (with active state logic) -->
                <div class="timeframe-buttons" style="display: flex; gap: 8px; width: 100%;">
                    <button class="tf-btn" data-tf="4h" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">4h</button>
                    <button class="tf-btn" data-tf="1d" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1d</button>
                    <button class="tf-btn" data-tf="1w" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1w</button>
                </div>

                <!-- Action Button -->
                <button id="btn-prepare" style="width: 100%; padding: 10px; background: var(--neon-purple, #8a2be2); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px;" onclick="window.updateAstro()">ئامادەکردن</button>
                
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ku';
        let selectedTimeframe = ''; // Holds the currently active timeframe value

        function applyLanguage() {
            try { currentLang = localStorage.getItem('rfx_lang') || 'ku'; } catch(e) {}
            document.documentElement.dir = currentLang === 'en' ? 'ltr' : 'rtl';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.lexicon && lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-menu').addEventListener('click', function(e) { 
                e.stopPropagation(); 
                document.getElementById('sidebar').classList.toggle('active'); 
            });
            document.getElementById('btn-close-menu').addEventListener('click', function() { 
                document.getElementById('sidebar').classList.remove('active'); 
            });

            // Handle the auto-hold touch logic for the timeframes
            const tfButtons = document.querySelectorAll('.tf-btn');
            tfButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Remove active state from all buttons
                    tfButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Add active state to the touched button
                    this.classList.add('active');
                    
                    // Update variable with current choice (e.g., '4h', '1d', '1w')
                    selectedTimeframe = this.getAttribute('data-tf');
                    console.log('Selected timeframe:', selectedTimeframe);
                    
                    // Optional: trigger calculations immediately when timeframe is selected
                    if (typeof window.updateAstro === 'function') {
                        window.updateAstro();
                    }
                });
            });

            applyLanguage();
        });
    </script>
</body>
</html>
