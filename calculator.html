<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <link rel="stylesheet" href="calculator.css">
    <link rel="stylesheet" href="pivot.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>San FX - Mathematical Pivot Levels</title>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <button class="menu-toggle" id="btn-menu" data-i18n="btn_menu">☰ ڕێکخستن</button>
        <div class="center-brand-text">@San_FX</div>
        <a href="index.html?showHub=true" class="back-arrow-btn">⬅️</a>
    </div>

<div class="levels-container">
    <div class="level-label lbl-hold">Tp hold</div>
    <div class="level-line line-top-hold" id="tphold-top-val">---</div>

    <div class="level-label">Tp4</div>
    <div class="level-box box-green" id="tp4-top-val">---</div>

    <div class="level-label">Tp3</div>
    <div class="level-box box-green" id="tp3-top-val">---</div>

    <div class="level-label">Tp2</div>
    <div class="level-box box-green" id="tp2-top-val">---</div>

    <div class="level-label">Tp1</div>
    <div class="level-box" id="tp1-top-val">---</div>

    <div class="pivot-block" id="pivot-center-val">---</div>

    <div class="level-label">Tp1</div>
    <div class="level-box" id="tp1-bot-val">---</div>

    <div class="level-label">Tp2</div>
    <div class="level-box box-red" id="tp2-bot-val">---</div>

    <div class="level-label">Tp3</div>
    <div class="level-box box-red" id="tp3-bot-val">---</div>

    <div class="level-label">Tp4</div>
    <div class="level-box box-red" id="tp4-bot-val">---</div>

    <div class="level-label lbl-hold">Tp hold</div>
    <div class="level-line line-bot-hold" id="tphold-bot-val">---</div>
</div>

    <div class="sidebar" id="sidebar">
        <button class="close-menu" id="btn-close-menu">✕</button>
        <h3 style="color: #fff; text-align: center; margin-top: 0; margin-bottom: 20px; padding: 10px 16px; font-family: 'Geeza Pro', 'Calibri', 'Tahoma', sans-serif; font-size: 17px; font-weight: bold; background: rgba(157, 78, 221, 0.06); border: 1px solid rgba(157, 78, 221, 0.2); border-radius: 8px; box-shadow: inset 0 0 8px #000000;" data-i18n="side_title">ژمێریاری جان</h3>
        
        <div id="controls-astro">
            <div class="search-box" style="display: flex; flex-direction: column; gap: 12px; padding: 10px;">
                <div class="search-group">
                    <input type="number" id="highPrice" placeholder="نرخی high" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>
                <div class="search-group">
                    <input type="number" id="lowPrice" placeholder="نرخی low" oninput="window.updateAstro()" style="width: 100%; padding: 10px; box-sizing: border-box;">
                </div>
                <div class="timeframe-buttons" style="display: flex; gap: 8px; width: 100%;">
                    <button class="tf-btn" data-tf="4h" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">4h</button>
                    <button class="tf-btn" data-tf="1d" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1d</button>
                    <button class="tf-btn" data-tf="1w" style="flex: 1; padding: 8px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.2s ease;">1w</button>
                </div>
                <button id="btn-prepare" style="width: 100%; padding: 10px; background: var(--neon-purple, #9d4edd); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 5px;" onclick="window.updateAstro()">ئامادەکردن</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ku';
        let selectedTimeframe = ''; 

        function applyLanguage() {
            try { currentLang = localStorage.getItem('rfx_lang') || 'ku'; } catch(e) {}
            document.documentElement.dir = currentLang === 'en' ? 'ltr' : 'rtl';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.lexicon && lexicon[currentLang] && lexicon[currentLang][key]) el.innerHTML = lexicon[currentLang][key];
            });
        }

        window.updateAstro = function() {
            const highInput = document.getElementById('highPrice').value;
            const lowInput = document.getElementById('lowPrice').value;

            if (!highInput || !lowInput) return;

            const high = parseFloat(highInput);
            const low = parseFloat(lowInput);
            if (high <= low) return;

            const pivot = (high + low) / 2;
            const range = high - low;

            const tp1_top = (pivot * 2) - low;
            const tp2_top = pivot + range;
            const tp3_top = high + 2 * (pivot - low);
            const tp4_top = tp3_top + (range * 0.5);
            const tphold_top = tp4_top + (range * 0.5);

            const tp1_bot = (pivot * 2) - high;
            const tp2_bot = pivot - range;
            const tp3_bot = low - 2 * (high - pivot);
            const tp4_bot = tp3_bot - (range * 0.5);
            const tphold_bot = tp4_bot - (range * 0.5);

            document.getElementById('pivot-center-val').innerText = pivot.toFixed(2);
            
            document.getElementById('tp1-top-val').innerText = tp1_top.toFixed(2);
            document.getElementById('tp2-top-val').innerText = tp2_top.toFixed(2);
            document.getElementById('tp3-top-val').innerText = tp3_top.toFixed(2);
            document.getElementById('tp4-top-val').innerText = tp4_top.toFixed(2);
            document.getElementById('tphold-top-val').innerText = "Hold: " + tphold_top.toFixed(2);

            document.getElementById('tp1-bot-val').innerText = tp1_bot.toFixed(2);
            document.getElementById('tp2-bot-val').innerText = tp2_bot.toFixed(2);
            document.getElementById('tp3-bot-val').innerText = tp3_bot.toFixed(2);
            document.getElementById('tp4-bot-val').innerText = tp4_bot.toFixed(2);
            document.getElementById('tphold-bot-val').innerText = "Hold: " + tphold_bot.toFixed(2);
        };

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-menu').addEventListener('click', function(e) { 
                e.stopPropagation(); 
                document.getElementById('sidebar').classList.toggle('active'); 
            });
            document.getElementById('btn-close-menu').addEventListener('click', function() { 
                document.getElementById('sidebar').classList.remove('active'); 
            });

            const tfButtons = document.querySelectorAll('.tf-btn');
            tfButtons.forEach(button => {
                button.addEventListener('click', function() {
                    tfButtons.forEach(btn => btn.style.background = '#222'); 
                    this.style.background = '#9d4edd'; 
                    selectedTimeframe = this.getAttribute('data-tf');
                    window.updateAstro();
                });
            });

            applyLanguage();
        });
    </script>
</body>
</html>
